<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello – mt.lxgr.net</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #0f172a;
        background: radial-gradient(circle at top, #f8fafc, #e2e8f0);
      }
      main {
        text-align: center;
        padding: 1.5rem;
        width: min(30rem, 100%);
      }
      h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
        margin-bottom: 0.75rem;
      }
      p {
        font-size: 1.125rem;
        margin: 0.5rem 0;
      }
      .card {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid #cbd5e1;
        border-radius: 1rem;
        padding: 1rem;
        margin-top: 1rem;
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
      }
      button {
        font: inherit;
        font-size: 1rem;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        border: 1px solid #0f172a;
        background: #0f172a;
        color: #f8fafc;
        cursor: pointer;
        width: 100%;
        max-width: 16rem;
      }
      button:active {
        transform: scale(0.99);
      }
      .muted {
        color: #334155;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello, mt.lxgr.net 👋</h1>
      <p>This is the starter single-page app under <code>/hello</code>.</p>

      <section class="card" aria-live="polite">
        <p><strong>Phone check:</strong> tap the button to verify touch interactions.</p>
        <button id="tapButton" type="button">Tap me</button>
        <p id="tapCount">Taps: 0</p>
        <p id="lastTap" class="muted">Last tap: not yet</p>
      </section>
    </main>

    <script>
      const tapButton = document.getElementById("tapButton");
      const tapCount = document.getElementById("tapCount");
      const lastTap = document.getElementById("lastTap");

      let count = 0;

      tapButton.addEventListener("click", () => {
        count += 1;
        tapCount.textContent = `Taps: ${count}`;
        lastTap.textContent = `Last tap: ${new Date().toLocaleTimeString()}`;
      });
    </script>
  </body>
</html>
